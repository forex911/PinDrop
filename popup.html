<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pindrop</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Header -->
    <header class="header">
      <div class="header__brand">
        <div class="header__logo">
          <img src="icon128.png" alt="PinDrop" style="width: 20px; height: 20px; object-fit: contain;">
        </div>
        <div class="header__title">
          <span class="header__name">Pindrop</span>
        </div>
      </div>

      <div class="header__actions" style="display: flex; align-items: center; gap: 12px;">
        <!-- GitHub Star -->
        <a href="https://github.com/sival/pindrop" target="_blank" title="Star on GitHub" style="color: var(--text-lo); transition: color 0.2s; display: flex; align-items: center;" onmouseover="this.style.color='var(--text-hi)'" onmouseout="this.style.color='var(--text-lo)'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
        </a>

        <!-- Master Toggle -->
        <label class="toggle" title="Enable / Disable extension">
          <input type="checkbox" id="enableToggle" checked>
          <span class="toggle__track">
            <span class="toggle__thumb"></span>
          </span>
        </label>
      </div>
    </header>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <div class="status-bar__dot" id="statusDot"></div>
      <span class="status-bar__label" id="statusLabel">Active — drag any Pinterest image</span>
    </div>

    <!-- Last Copied Preview -->
    <section class="preview-section" id="previewSection">
      <div class="section-label">Last Copied</div>
      <div class="preview-card" id="previewCard">
        <div class="preview-card__empty" id="previewEmpty">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" opacity="0.5"/>
            <path d="M3 16L8 11L12 15L15 12L21 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          </svg>
          <span>No images copied yet</span>
        </div>
        <div class="preview-card__content" id="previewContent" style="display:none">
          <img id="previewImg" src="" alt="Last copied image">
          <div class="preview-card__meta">
            <span class="preview-card__label">PNG · Ready to paste</span>
            <span class="preview-card__time" id="previewTime">—</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Session History -->
    <section class="history-section">
      <div class="history-header">
        <span class="section-label">Session History</span>
        <button class="clear-btn" id="clearBtn" title="Clear session history">Clear</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-list__empty" id="historyEmpty">
          <span>Drag images to start collecting</span>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer__stat">
        <span class="footer__count" id="copiedCount">0</span>
        <span class="footer__stat-label">copied this session</span>
      </div>
      <div class="footer__workflow">
        <span class="wf-step">Drag</span>
        <span class="wf-arrow">→</span>
        <span class="wf-step">Auto Copy</span>
        <span class="wf-arrow">→</span>
        <span class="wf-step wf-step--accent">Ctrl+V</span>
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
